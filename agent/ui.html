<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Coding Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
    }

    header span {
      font-size: 12px;
      color: #8b949e;
    }

    #chat-container {
      width: 100%;
      max-width: 800px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: #1f6feb;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .agent .bubble {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 11px;
      color: #8b949e;
      margin-top: 4px;
      padding: 0 4px;
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #30363d;
    }

    #user-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 12px 16px;
      font-size: 14px;
      resize: none;
      height: 48px;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #58a6ff; }

    #send-btn {
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

    .thinking {
      color: #8b949e;
      font-style: italic;
      font-size: 13px;
      padding: 8px 0;
    }

    code {
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>🤖 AI Coding Agent</h1>
  <span>Powered by qwen2.5-coder:7b via Ollama · Fully Local</span>
</header>

<div id="chat-container">
  <div class="message agent">
    <div class="bubble">Hello! I'm your local AI coding agent. I can write, read, and run files in the workspace. What would you like me to build?</div>
    <div class="meta">Agent · ready</div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask me to write code, create files, run commands..."></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let sessionId = "";

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const text = input.value.trim();
    if (!text) return;

    appendMessage("user", text, "");
    input.value = "";
    btn.disabled = true;

    const thinking = appendThinking();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      const data = await res.json();
      sessionId = data.session_id;
      thinking.remove();
      appendMessage("agent", data.reply, `Agent · ${data.steps_taken} step${data.steps_taken !== 1 ? "s" : ""}`);
    } catch (err) {
      thinking.remove();
      appendMessage("agent", `Error: ${err.message}`, "Agent · error");
    }

    btn.disabled = false;
    input.focus();
  }

  function appendMessage(role, text, meta) {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="bubble">${escapeHtml(text)}</div>
      ${meta ? `<div class="meta">${meta}</div>` : ""}
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendThinking() {
    const container = document.getElementById("chat-container");
    const div = document.createElement("div");
    div.className = "thinking";
    div.textContent = "Agent is thinking...";
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  document.getElementById("user-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
